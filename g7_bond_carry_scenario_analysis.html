
<h2 class="sr-only">G7主要国家10年期国债息差与资本损益情景分析（2026年5月）</h2>

<style>
  .bond-wrap { font-family: var(--font-sans); padding: 1rem 0; }
  .section-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin: 1.5rem 0 0.5rem; }
  .metrics-grid { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .mcard { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
  .mcard .country { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; font-weight: 500; }
  .mcard .yield { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .mcard .sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 3px; }
  .mcard .spread { font-size: 13px; font-weight: 500; margin-top: 6px; padding: 3px 8px; border-radius: 4px; display: inline-block; }
  .pos { background: #EAF3DE; color: #3B6D11; }
  .neg { background: #FCEBEB; color: #A32D2D; }
  .scenario-tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
  .tab { padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); font-size: 13px; cursor: pointer; color: var(--color-text-secondary); background: var(--color-background-primary); }
  .tab.active { background: var(--color-background-info); color: var(--color-text-info); border-color: transparent; font-weight: 500; }
  .scenario-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .scard { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px; }
  .scard.best { border-color: #1D9E75; border-width: 1.5px; }
  .scard .sname { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 8px; }
  .scard .sval { font-size: 22px; font-weight: 500; }
  .scard .sval.green { color: #3B6D11; }
  .scard .sval.red { color: #A32D2D; }
  .scard .sval.amber { color: #854F0B; }
  .scard .sdesc { font-size: 11px; color: var(--color-text-secondary); margin-top: 6px; line-height: 1.5; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
  .badge-dove { background: #E1F5EE; color: #0F6E56; }
  .badge-neutral { background: #FAEEDA; color: #854F0B; }
  .badge-hawk { background: #FCEBEB; color: #A32D2D; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; color: var(--color-text-secondary); font-weight: 500; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 12px; }
  td { padding: 8px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
  tr:last-child td { border-bottom: none; }
  .tag-rec { background: #E1F5EE; color: #0F6E56; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .note { font-size: 11px; color: var(--color-text-secondary); margin-top: 1rem; line-height: 1.6; padding: 10px 14px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); }
  .chart-wrap { margin: 1rem 0; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
  .bar-label { font-size: 12px; color: var(--color-text-secondary); width: 70px; flex-shrink: 0; }
  .bar-bg { flex: 1; height: 24px; background: var(--color-background-secondary); border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; display: flex; align-items: center; padding-left: 8px; font-size: 12px; font-weight: 500; transition: width 0.5s; }
</style>

<div class="bond-wrap">

<p class="section-label">当前市场数据（2026年5月14日）</p>
<div class="metrics-grid" id="mainCards"></div>

<p class="section-label">三情景净收益分析（每100万本金，持仓1年）</p>

<div class="scenario-tabs">
  <button class="tab active" onclick="setScen(0,this)">鸽派情景</button>
  <button class="tab" onclick="setScen(1,this)">中性情景</button>
  <button class="tab" onclick="setScen(2,this)">鹰派情景</button>
</div>

<div class="scenario-grid" id="scenCards"></div>

<p class="section-label">综合盈率排名对比</p>
<div id="rankChart" class="chart-wrap"></div>

<p class="section-label">各情景净损益汇总（bps变动 → 资本损益 + 净息差）</p>
<div style="overflow-x:auto">
<table id="summaryTable"></table>
</div>

<div class="note" id="noteText"></div>

</div>

<script>
const bonds = [
  { code:'AU', name:'澳大利亚', inst:'ACGB', y10: 5.09, fund: 4.35, ref:'BBSW 3M ≈ 4.50%' },
  { code:'UK', name:'英国',     inst:'Gilt', y10: 5.11, fund: 3.75, ref:'SONIA 3M ≈ 3.85%' },
  { code:'DE', name:'德国',     inst:'Bund', y10: 3.02, fund: 2.00, ref:'EURIBOR 3M ≈ 2.15%' },
  { code:'FR', name:'法国',     inst:'OAT',  y10: 3.68, fund: 2.00, ref:'EURIBOR 3M ≈ 2.15%' },
  { code:'JP', name:'日本',     inst:'JGB',  y10: 2.59, fund: 0.50, ref:'TONAR 3M ≈ 0.65%' },
];

const scenarios = [
  {
    name:'鸽派',badge:'badge-dove',label:'鸽派 · 降息预期',
    desc:'中东冲突缓和，油价回落，各央行转向降息或暂停加息。',
    shiftBp: { AU:-25, UK:-50, DE:-25, FR:-25, JP:+25 },
    fundShift: { AU:-0.25, UK:-0.50, DE:-0.25, FR:-0.25, JP:+0.25 },
    rationale: '油价下行缓解通胀，英/澳央行开始降息，ECB保持不变，BOJ仍有小幅加息压力。'
  },
  {
    name:'中性',badge:'badge-neutral',label:'中性 · 维持当前',
    desc:'全球利率维持现状，中东局势胶着，通胀温和。',
    shiftBp: { AU:+10, UK:+25, DE:+15, FR:+15, JP:+30 },
    fundShift: { AU:+0.10, UK:+0.25, DE:+0.10, FR:+0.10, JP:+0.30 },
    rationale: '现有紧缩政策维持，BOJ因通胀逼近2%继续小幅加息，英国政治风险带来额外溢价。'
  },
  {
    name:'鹰派',badge:'badge-hawk',label:'鹰派 · 继续加息',
    desc:'油价持续高企，通胀再度升温，各央行被迫再度加息。',
    shiftBp: { AU:+75, UK:+100, DE:+50, FR:+60, JP:+75 },
    fundShift: { AU:+0.50, UK:+0.75, DE:+0.50, FR:+0.50, JP:+0.50 },
    rationale: '市场已定价英国3次加息，澳大利亚进一步加息至4.85%，BOJ加速正常化，ECB被迫跟进。'
  }
];

const DV01_PER_100K = 8.5;

function dur(y) {
  return 7.5 + (1/(1+y/100)) * 2.5;
}

function capitalLoss(y10, shiftBp) {
  const d = dur(y10);
  return -d * (shiftBp/100) * 1000000 / 100;
}

function netIncome(y10, fund, fundShift, shiftBp) {
  const avgFund = fund + fundShift / 2;
  const spread = (y10 / 100 - avgFund / 100) * 1000000;
  return spread;
}

function totalReturn(y10, fund, shiftBp, fundShift) {
  const cl = capitalLoss(y10, shiftBp);
  const ni = netIncome(y10, fund, fundShift, shiftBp);
  return cl + ni;
}

let currentScen = 0;

function render() {
  renderCards();
  renderScen();
  renderRank();
  renderTable();
  renderNote();
}

function renderCards() {
  const c = document.getElementById('mainCards');
  c.innerHTML = bonds.map(b => {
    const spread = (b.y10 - b.fund).toFixed(2);
    const spreadClass = spread > 0 ? 'pos' : 'neg';
    const spreadSign = spread > 0 ? '+' : '';
    return `<div class="mcard">
      <div class="country">${b.name} ${b.inst}</div>
      <div class="yield">${b.y10.toFixed(2)}%</div>
      <div class="sub">资金成本 ${b.fund.toFixed(2)}%</div>
      <div class="sub" style="font-size:10px;margin-top:2px">${b.ref}</div>
      <div class="spread ${spreadClass}">${spreadSign}${spread}% 息差</div>
    </div>`;
  }).join('');
}

function renderScen() {
  const s = scenarios[currentScen];
  const c = document.getElementById('scenCards');
  c.innerHTML = bonds.map(b => {
    const shift = s.shiftBp[b.code];
    const fshift = s.fundShift[b.code];
    const cl = capitalLoss(b.y10, shift);
    const ni = netIncome(b.y10, b.fund, fshift, shift);
    const tot = cl + ni;
    const isBest = Math.max(...bonds.map(x => totalReturn(x.y10, x.fund, s.shiftBp[x.code], s.fundShift[x.code]))) === tot;
    const clStr = (cl >= 0 ? '+' : '') + (cl/10000).toFixed(1) + 'w';
    const niStr = (ni >= 0 ? '+' : '') + (ni/10000).toFixed(1) + 'w';
    const totStr = (tot >= 0 ? '+' : '') + (tot/10000).toFixed(1) + 'w';
    const totClass = tot > 0 ? 'green' : tot < -20000 ? 'red' : 'amber';
    return `<div class="scard${isBest?' best':''}">
      ${isBest ? '<span class="tag-rec" style="font-size:10px;margin-bottom:6px;display:inline-block">⭐ 本情景最优</span>' : ''}
      <div class="sname">${b.name} ${b.inst}</div>
      <div class="sval ${totClass}">${totStr}</div>
      <div class="sdesc">
        资本损益 <strong>${clStr}</strong><br>
        净息差收入 <strong>${niStr}</strong><br>
        收益率变动 <span style="color:${shift>0?'#A32D2D':'#3B6D11'}">${shift>0?'+':''}${shift}bp</span> / 资金成本变动 ${fshift>0?'+':''}${(fshift*100).toFixed(0)}bp
      </div>
    </div>`;
  }).join('');
}

function renderRank() {
  const c = document.getElementById('rankChart');
  const colors = ['#1D9E75','#378ADD','#EF9F27','#E24B4A','#534AB7'];
  const rows = bonds.map((b,i) => {
    const s = scenarios[currentScen];
    const tot = totalReturn(b.y10, b.fund, s.shiftBp[b.code], s.fundShift[b.code]);
    return { name: b.name + ' ' + b.inst, val: tot, color: colors[i] };
  }).sort((a,b) => b.val - a.val);

  const maxAbs = Math.max(...rows.map(r => Math.abs(r.val)), 100000);
  c.innerHTML = rows.map(r => {
    const pct = Math.abs(r.val) / maxAbs * 100;
    const isPos = r.val >= 0;
    const label = (r.val >= 0 ? '+' : '') + (r.val/10000).toFixed(1) + '万';
    return `<div class="bar-row">
      <div class="bar-label">${r.name}</div>
      <div class="bar-bg">
        <div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${isPos ? r.color : '#E24B4A'};color:white">${label}</div>
      </div>
    </div>`;
  }).join('');
}

function renderTable() {
  const t = document.getElementById('summaryTable');
  const heads = ['债券','10Y收益率','资金成本','当前息差','鸽派净收益','中性净收益','鹰派净收益'];
  const hRow = `<tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr>`;
  const rows = bonds.map(b => {
    const vals = scenarios.map(s => {
      const tot = totalReturn(b.y10, b.fund, s.shiftBp[b.code], s.fundShift[b.code]);
      const col = tot > 0 ? '#3B6D11' : tot > -30000 ? '#854F0B' : '#A32D2D';
      return `<td style="color:${col};font-weight:500">${(tot>0?'+':'')+(tot/10000).toFixed(1)}万</td>`;
    }).join('');
    const sp = (b.y10 - b.fund).toFixed(2);
    return `<tr>
      <td style="font-weight:500">${b.name} ${b.inst}</td>
      <td>${b.y10.toFixed(2)}%</td>
      <td>${b.fund.toFixed(2)}%</td>
      <td style="color:${sp>0?'#3B6D11':'#A32D2D'};font-weight:500">${sp>0?'+':''}${sp}%</td>
      ${vals}
    </tr>`;
  }).join('');
  t.innerHTML = `<thead>${hRow}</thead><tbody>${rows}</tbody>`;
}

function renderNote() {
  const s = scenarios[currentScen];
  document.getElementById('noteText').innerHTML =
    `<strong>${s.label}</strong>：${s.rationale}<br>
    <span style="opacity:0.8">注：净收益以每100万本币计算。资本损益使用修正久期估算（约7.5-9年）。资金成本为3个月浮动利率，1年内按加权平均计算。所有分析均为同一货币单位，未考虑汇率影响。</span>`;
}

function setScen(idx, el) {
  currentScen = idx;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderScen();
  renderRank();
  renderNote();
}

render();
</script>
